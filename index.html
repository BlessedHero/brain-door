const u8=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function open(pass){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:u8(PAYLOAD.salt),iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:u8(PAYLOAD.iv)},key,u8(PAYLOAD.ct));
  const html=new TextDecoder().decode(pt);
  localStorage.setItem("heroa-pass",pass);
  document.open();document.write(html);document.close();
}

  ev.preventDefault();
  try{await open(document.getElementById("p").value)}

});
const saved=localStorage.getItem("heroa-pass");
if(saved){open(saved).catch(()=>localStorage.removeItem("heroa-pass"))}
